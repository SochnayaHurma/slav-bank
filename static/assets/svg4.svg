<svg class="hero-ill" width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img"
  aria-label="Иллюстрация: РКО — банк, платежи и документы">
  <defs>
    <linearGradient id="rkoA_g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006780" stop-opacity=".92"/>
      <stop offset="1" stop-color="#0ea5b7" stop-opacity=".85"/>
    </linearGradient>
    <linearGradient id="rkoA_g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d0b8a3" stop-opacity=".85"/>
      <stop offset="1" stop-color="#918078" stop-opacity=".55"/>
    </linearGradient>
    <filter id="rkoA_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <circle cx="190" cy="130" r="120" fill="url(#rkoA_g1)" opacity=".16" filter="url(#rkoA_blur)"/>
  <circle cx="750" cy="420" r="150" fill="url(#rkoA_g2)" opacity=".15" filter="url(#rkoA_blur)"/>

  <path class="silk s1" d="M40 330 C170 250, 260 420, 385 340 S 585 180, 720 240 S 840 380, 880 320"
    fill="none" stroke="#006780" stroke-width="6" stroke-linecap="round" opacity=".55"/>
  <path class="silk s2" d="M70 390 C210 300, 280 505, 445 420 S 645 220, 790 310 S 860 420, 890 360"
    fill="none" stroke="#9fd5d5" stroke-width="5" stroke-linecap="round" opacity=".75"/>
  <path class="silk s3" d="M95 255 C235 195, 320 345, 455 280 S 650 120, 795 200 S 865 310, 890 260"
    fill="none" stroke="#d0b8a3" stroke-width="4" stroke-linecap="round" opacity=".65"/>

  <!-- bank building -->
  <g transform="translate(235 140)" opacity=".95">
    <rect x="0" y="60" rx="22" ry="22" width="320" height="260" fill="#fff" opacity=".86"
      stroke="rgba(2,6,23,.12)" stroke-width="2"/>
    <path d="M30 86 L160 26 L290 86" fill="none" stroke="rgba(0,103,128,.28)" stroke-width="8"
      stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="52" y="118" width="38" height="150" rx="10" fill="rgba(0,103,128,.12)"/>
    <rect x="112" y="118" width="38" height="150" rx="10" fill="rgba(0,103,128,.10)"/>
    <rect x="172" y="118" width="38" height="150" rx="10" fill="rgba(0,103,128,.12)"/>
    <rect x="232" y="118" width="38" height="150" rx="10" fill="rgba(0,103,128,.10)"/>
    <rect x="40" y="284" rx="12" ry="12" width="280" height="22" fill="rgba(0,103,128,.10)"/>
  </g>

  <!-- account card / payment -->
  <g transform="translate(610 140)">
    <rect x="0" y="0" rx="22" ry="22" width="250" height="310" fill="#fff" opacity=".86"
      stroke="rgba(2,6,23,.12)" stroke-width="2"/>
    <rect x="28" y="54" rx="10" ry="10" width="180" height="16" fill="#006780" opacity=".18"/>
    <rect x="28" y="92" rx="10" ry="10" width="150" height="14" fill="#006780" opacity=".12"/>
    <rect x="28" y="136" rx="10" ry="10" width="190" height="14" fill="#006780" opacity=".10"/>
    <rect x="28" y="168" rx="10" ry="10" width="160" height="14" fill="#006780" opacity=".08"/>

    <g transform="translate(28 220)" opacity=".95">
      <rect x="0" y="0" rx="14" ry="14" width="190" height="62" fill="url(#rkoA_g1)" opacity=".18"
        stroke="rgba(0,103,128,.22)"/>
      <path d="M22 31 H122" stroke="#006780" stroke-width="4" stroke-linecap="round" opacity=".72"/>
      <path d="M122 22 L142 31 L122 40" fill="none" stroke="#006780" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
    </g>
  </g>
</svg>