<svg class="hero-ill" width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img"
  aria-label="Иллюстрация: валютный контроль — штамп, документ и защита">
  <defs>
    <linearGradient id="ccB_g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006780" stop-opacity=".95"/>
      <stop offset="1" stop-color="#9fd5d5" stop-opacity=".85"/>
    </linearGradient>
    <linearGradient id="ccB_g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d0b8a3" stop-opacity=".85"/>
      <stop offset="1" stop-color="#918078" stop-opacity=".55"/>
    </linearGradient>
    <filter id="ccB_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <circle cx="210" cy="140" r="120" fill="url(#ccB_g2)" opacity=".16" filter="url(#ccB_blur)"/>
  <circle cx="740" cy="420" r="150" fill="url(#ccB_g1)" opacity=".14" filter="url(#ccB_blur)"/>

  <path class="silk s1" d="M50 410 C180 320, 260 520, 385 420 S 590 230, 720 305 S 840 470, 880 410"
    fill="none" stroke="#006780" stroke-width="6" stroke-linecap="round" opacity=".52"/>
  <path class="silk s2" d="M70 300 C220 220, 300 390, 440 315 S 640 165, 790 260 S 860 355, 890 300"
    fill="none" stroke="#9fd5d5" stroke-width="5" stroke-linecap="round" opacity=".76"/>
  <path class="silk s3" d="M110 215 C260 150, 330 270, 455 225 S 650 90, 795 165 S 865 245, 890 215"
    fill="none" stroke="#d0b8a3" stroke-width="4" stroke-linecap="round" opacity=".66"/>

  <!-- stamp -->
  <g transform="translate(250 110)">
    <circle cx="170" cy="170" r="140" fill="#fff" opacity=".86" stroke="rgba(2,6,23,.12)" stroke-width="2"/>
    <circle cx="170" cy="170" r="104" fill="none" stroke="rgba(0,103,128,.18)" stroke-width="3"/>
    <path d="M110 170 L150 210 L230 130" fill="none" stroke="#006780" stroke-width="10"
      stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>
    <path d="M96 110 H244" stroke="rgba(0,103,128,.14)" stroke-width="6" stroke-linecap="round"/>
    <path d="M118 240 H222" stroke="rgba(0,103,128,.12)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- document + lock -->
  <g transform="translate(610 105)">
    <rect x="0" y="0" rx="22" ry="22" width="260" height="330" fill="#fff" opacity=".86"
      stroke="rgba(2,6,23,.12)" stroke-width="2"/>
    <rect x="30" y="60" rx="10" ry="10" width="190" height="16" fill="#006780" opacity=".18"/>
    <rect x="30" y="96" rx="10" ry="10" width="160" height="14" fill="#006780" opacity=".12"/>
    <rect x="30" y="140" rx="10" ry="10" width="190" height="14" fill="#006780" opacity=".10"/>
    <rect x="30" y="172" rx="10" ry="10" width="150" height="14" fill="#006780" opacity=".08"/>

    <g transform="translate(62 225)" opacity=".95">
      <rect x="0" y="26" rx="14" ry="14" width="136" height="92" fill="url(#ccB_g1)" opacity=".18"
