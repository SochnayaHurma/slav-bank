      <path d="M34 26 v-18 c0-18 12-30 34-30 s34 12 34 30 v18"
        fill="none" stroke="rgba(0,103,128,.35)" stroke-width="6" stroke-linecap="round"/>
      <circle cx="68" cy="78" r="10" fill="#006780" opacity=".65"/>
      <path d="M68 88 v18" stroke="#006780" stroke-width="6" stroke-linecap="round" opacity=".65"/>
    </g>
  </g>
