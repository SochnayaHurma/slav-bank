{% load static %}
<div class="v3-mobile-nav" data-v3-mobile-nav>
  <header class="header reveal v3-header" data-reveal="scale">
    <div class="container v3-nav">
      <a class="v3-brand" href="/" aria-label="СЛАВЯНБАНК">
        <img src="{% static './logo2.png' %}" alt="СЛАВЯНБАНК" />
      </a>

      <nav class="v3-links" aria-label="Навигация preview v3">
        <a href="{% url 'legal-entities' %}">Юридическим лицам</a>
        <a href="{% url 'currency-control' %}">Валютный контроль</a>
        <a href="{% url 'client-bank-online' %}">Клиент-Банк</a>

        <a href="{% url 'contacts' %}">Контакты</a>
      </nav>

      <a class="btn primary v3-head-cta" href="{% url 'write-to-bank' %}#form">Оставить обращение</a>

      <button
        class="v3-menu-btn"
        type="button"
        aria-expanded="false"
        aria-controls="v3MobileMenu"
        aria-label="Открыть меню"
      >
        <span class="v3-menu-ic" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span>Меню</span>
      </button>
    </div>
  </header>

  <div class="v3-mobile-backdrop" aria-hidden="true"></div>

  <aside
    class="v3-mobile-menu glass"
    id="v3MobileMenu"
    aria-hidden="true"
    aria-label="Мобильное меню"
    role="dialog"
    aria-modal="true"
  >
    <div class="v3-mobile-head">
      <a class="v3-brand v3-mobile-brand" href="/" aria-label="СЛАВЯНБАНК">
        <img src="{% static './assets/cleaned_logo2.png' %}" alt="СЛАВЯНБАНК" />
      </a>

      <button class="btn v3-mobile-close" type="button" aria-label="Закрыть меню">✕</button>
    </div>

    <nav class="v3-mobile-links" aria-label="Навигация preview v3 mobile">
      <a href="{% url 'legal-entities' %}">Юридическим лицам</a>
      <a href="{% url 'currency-control' %}">Валютный контроль</a>
      <a href="{% url 'client-bank-online' %}">Клиент-Банк</a>
      <a href="{% url 'tariffs' %}">Тарифы</a>
      <a href="{% url 'contacts' %}">Контакты</a>
    </nav>

    <a class="btn primary v3-mobile-cta" href="{% url 'write-to-bank' %}#form">Оставить обращение</a>
