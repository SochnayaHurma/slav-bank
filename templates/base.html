{% load static %}
<!doctype html>
<html lang="ru" data-a11y="0">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>{% block title %}СЛАВЯНБАНК{% endblock %}</title>
  <link rel="icon"
    href="https://slavbank.ru/wp-content/uploads/cropped-cropped-cropped-slavyanbank-logo-main-cmyk-32x32.png"
    sizes="32x32">
  <link rel="icon"
    href="https://slavbank.ru/wp-content/uploads/cropped-cropped-cropped-slavyanbank-logo-main-cmyk-192x192.png"
    sizes="192x192">
  <meta name="msapplication-TileImage"
    content="https://slavbank.ru/wp-content/uploads/cropped-cropped-cropped-slavyanbank-logo-main-cmyk-270x270.png">
  <link rel="stylesheet" href="{% static 'tokens.css' %}" />
  <link rel="stylesheet" href="{% static 'motion.css' %}" />
  <link rel="stylesheet" href="{% static 'figure.css' %}" />
  <link rel="stylesheet" href="{% static 'footer.css' %}" />
  <link rel="stylesheet" href="{% static 'form.css' %}" />
  <style>
    body {
      background:
        radial-gradient(1100px 600px at 85% -20%,
          rgba(0, 103, 128, 0.18),
          transparent 55%),
        radial-gradient(900px 520px at 10% -10%,
          rgba(208, 184, 163, 0.2),
          transparent 55%),
        var(--c-bg);
    }

    .skip {
      position: absolute;
      left: -999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .skip:focus {
      left: 16px;
      top: 16px;
      width: auto;
      height: auto;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      z-index: 100;
    }

    .topbar {
      padding: 10px 0;
      font-size: 13px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 12px 0;
      border-bottom: 1px solid rgba(2, 6, 23, 0.08);
      background: rgba(245, 250, 252, 0.68);
      backdrop-filter: blur(14px);
    }

    html[data-a11y="1"] .header {
      background: #fff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 172px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--c-primary), #0ea5b7);
      overflow: hidden;
      box-shadow: 0 10px 18px rgba(0, 103, 128, 0.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      font-weight: 900;
    }

    .brand h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.02em;
      font-weight: 600;
    }

    .brand .sub {
      font-size: 12px;
      color: var(--c-muted);
      margin-top: 2px;
      font-weight: 300;
    }

    nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .navlink {
      padding: 10px 10px;
      border-radius: var(--r-md);
      border: 1px solid transparent;
      font-size: 13px;
    }

    .navlink:hover {
      text-decoration: none;
      border-color: var(--c-border);
      background: rgba(255, 255, 255, 0.8);
    }

    .navlink[aria-expanded="true"] {
      background: #fff;
      border-color: rgba(2, 6, 23, 0.16);
    }

    .menu-btn {
      display: none;
    }

    .mega {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc(100% + 10px);
      width: min(var(--container), calc(100vw - 40px));
      display: none;
    }

    .mega.open {
      display: block;
    }

    .mega .grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: var(--s-4);
    }

    .mega .col {
      padding: var(--s-4);
      border-radius: var(--r-md);
      border: 1px solid var(--c-border);
      background: rgba(255, 255, 255, 0.9);
    }

    .mega h3 {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--c-muted);
      font-weight: 600;
    }

    /* Search modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.55);
      display: none;
      z-index: 80;
    }

    .overlay.open {
      display: block;
    }

    .modal {
      width: min(760px, calc(100vw - 40px));
      margin: 80px auto 0;
      padding: var(--s-4);
      border-radius: 20px;
    }

    .searchbox {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--c-border);
      background: #fff;
    }

    .searchbox input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
    }

    .kbd {
      padding: 2px 7px;
      border: 1px solid var(--c-border);
      border-bottom-width: 2px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--c-muted);
      background: #fff;
    }

    main {
      padding: var(--s-4) 0 var(--s-7);
    }

    section.block {
      padding: var(--s-5) 0;
    }

    .section-head {
      display: flex;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
      margin: 6px 0 12px 28px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .section-head p {
      margin: 0;
      color: var(--c-muted);
      font-size: 13px;
      font-weight: 300;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--s-4);
    }

    .tile {
      padding: var(--s-4);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      background: #fff;
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      transition:
        transform var(--t-fast) var(--ease),
        box-shadow var(--t-fast) var(--ease);
    }

    .tile:hover {
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .tile h3 {
      margin: 8px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .tile p {
      margin: 0;
      font-size: 12px;
      color: var(--c-muted);
    }

    /* News scroller */
    .scroller {
      display: flex;
      gap: var(--s-4);
      overflow: auto;
      scroll-snap-type: x mandatory;
      padding: 4px 2px 10px;
    }

    .news {
      min-width: min(360px, 85vw);
      scroll-snap-align: start;
      padding: var(--s-4);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      background: #fff;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }

    .news .meta {
      font-size: 12px;
      color: var(--c-muted);
      font-weight: 300;
    }

    .news h3 {
      margin: 8px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .news p {
      margin: 0;
      color: var(--c-muted);
      font-size: 12px;
      font-weight: 300;
    }

    /* CTA */
    .cta {
      padding: var(--s-5);
      display: flex;
      gap: var(--s-4);
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--r-lg);
      background: linear-gradient(135deg,
          rgba(0, 103, 128, 0.95),
          rgba(14, 165, 183, 0.9));
      color: #fff;
      box-shadow: var(--shadow-md);
    }

    .cta h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .cta p {
      margin: 4px 0 0;
      opacity: 0.92;
      font-size: 13px;
      max-width: 60ch;
      font-weight: 300;
    }

    /* Footer */
    footer {
      padding: var(--s-6) 0 var(--s-6);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: var(--s-4);
    }

    .foot {
      padding: var(--s-4);
    }

    .foot h3 {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-muted);
      font-weight: 600;
    }

    .foot a {
      display: inline-flex;
      padding: 6px 0;
      text-decoration: none;
      font-weight: 300;
    }

    .foot a:hover {
      text-decoration: none;
    }

    .fine {
      margin-top: 12px;
      color: var(--c-muted);
      font-size: 12px;
      font-weight: 300;
    }

    @media (max-width: 980px) {
      nav {
        display: none;
      }

      .menu-btn {
        display: inline-flex;
      }

      .grid3 {
        grid-template-columns: 1fr;
      }

      .footer-grid {
        grid-template-columns: 1fr;
      }

      .mega {
        left: 20px;
        transform: none;
        width: calc(100vw - 40px);
      }

      .mega .grid {
        grid-template-columns: 1fr;
      }

      .brand {
        min-width: auto;
      }
    }
  </style>
  <style>
  .topbar {
    display: none;
  }

  .v3-header {
    background: rgba(245, 250, 252, .56);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(2, 6, 23, .06);
  }

  .v3-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .v3-brand {
    display: flex;
    align-items: center;
    width: 188px;
    max-width: 100%;
    text-decoration: none;
  }

  .v3-brand img {
    display: block;
    width: 100%;
    height: auto;
  }

  .v3-links {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1 1 420px;
    flex-wrap: wrap;
  }

  .v3-links a {
    padding: 10px 14px;
    border-radius: 999px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,.42);
    background: rgba(255,255,255,.46);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 24px rgba(2, 6, 23, .04);
    transition: transform var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }

  .v3-links a:hover {
    text-decoration: none;
    transform: translateY(-1px);
    background: rgba(255,255,255,.66);
    border-color: rgba(0, 103, 128, .18);
  }

  .v3-head-cta {
    white-space: nowrap;
  }
  .v3-mobile-backdrop,
  .v3-mobile-menu,
  .v3-menu-btn {
    display: none;
  }

  .v3-menu-btn {
    margin-left: auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.42);
    background: rgba(255,255,255,.46);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 24px rgba(2, 6, 23, .04);
    color: var(--c-text);
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }

  .v3-menu-btn:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,.66);
    border-color: rgba(0, 103, 128, .18);
  }

  .v3-menu-ic {
    display: inline-grid;
    gap: 4px;
  }

  .v3-menu-ic span {
    display: block;
    width: 18px;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
  }

  .v3-mobile-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 23, .56);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--t-med) var(--ease);
    z-index: 59;
  }

  .v3-mobile-menu {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(380px, 92vw);
    padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom)) 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transform: translateX(100%);
    transition: transform var(--t-med) var(--ease);
    z-index: 60;
    border-radius: 28px 0 0 28px;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  .v3-mobile-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .v3-mobile-brand {
    width: 150px;
  }

  .v3-mobile-close {
    margin-left: auto;
    border-radius: 999px;
  }

  .v3-mobile-links {
    display: grid;
    gap: 10px;
  }

  .v3-mobile-links a {
    display: flex;
    align-items: center;
    min-height: 52px;
    padding: 14px 16px;
    border-radius: 20px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.10);
    color: #fff;
    backdrop-filter: blur(12px);
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }

  .v3-mobile-links a:hover {
    text-decoration: none;
    background: rgba(255,255,255,.16);
    border-color: rgba(255,255,255,.30);
    transform: translateY(-1px);
  }

  .v3-mobile-cta {
    margin-top: auto;
  }

  .v3-mobile-nav.v3-menu-open .v3-mobile-backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .v3-mobile-nav.v3-menu-open .v3-mobile-menu {
    transform: translateX(0);
  }

  body.v3-lock {
    overflow: hidden;
  }
  .v3home {
    padding-bottom: 50px;
  }

  .v3home section.block {
    padding: 20px 0 34px;
  }

  .glass {
    border: 1px solid rgba(255,255,255,.24);
    background: rgba(255,255,255,.14);
    backdrop-filter: blur(18px);
    box-shadow: 0 24px 60px rgba(2, 6, 23, .10);
  }

  .v3-hero {
    position: relative;
    overflow: hidden;
    border-radius: 34px;
    min-height: 650px;
    padding: 28px;
    background:
      linear-gradient(115deg, rgba(0, 50, 63, .78) 0%, rgba(0, 70, 89, .62) 34%, rgba(0, 0, 0, .18) 100%),
      radial-gradient(720px 320px at 82% 18%, rgba(159, 213, 213, .18), transparent 58%),
      url("{% static 'assets/05e00c50-ede1-47ee-aaab-75ad056b498a.png' %}") center / cover no-repeat;
    box-shadow: 0 30px 90px rgba(2, 6, 23, .14);
  }

  .v3-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent 0 8%, rgba(255,255,255,.06) 8% 8.4%, transparent 8.4% 17%, rgba(208,184,163,.10) 17% 17.4%, transparent 17.4% 100%),
      linear-gradient(transparent 0 12%, rgba(255,255,255,.04) 12% 12.4%, transparent 12.4% 24%, rgba(159,213,213,.08) 24% 24.4%, transparent 24.4% 100%);
    background-size: 138px 138px;
    opacity: .55;
  }

  .v3-hero-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1.02fr .98fr;
    gap: 18px;
    align-items: stretch;
  }

  .v3-copy {
    padding: 28px;
    border-radius: 28px;
    color: #fff;
    align-self: start;
    max-width: 640px;
  }

  .v3-kicker {
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.20);
    color: rgba(255,255,255,.88);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .v3-title {
    margin: 16px 0 12px;
    max-width: 11ch;
    font-size: clamp(38px, 5vw, 70px);
    line-height: 1.02;
    letter-spacing: -.03em;
  }

  .v3-lead {
    margin: 0;
    max-width: 42ch;
    color: rgba(255,255,255,.82);
    font-size: 17px;
    line-height: 1.65;
  }

  .v3-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 24px;
  }

  .v3-actions .btn.outline,
  .v3-actions .btn.glass {
    color: #fff;
    border-color: rgba(255,255,255,.24);
    background: rgba(255,255,255,.10);
  }

  .v3-actions .btn.outline:hover,
  .v3-actions .btn.glass:hover {
    background: rgba(255,255,255,.16);
  }

  .v3-chip-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 18px;
  }

  .v3-chip {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.18);
    color: #fff;
    text-decoration: none;
    backdrop-filter: blur(12px);
  }

  .v3-chip:hover {
    text-decoration: none;
    background: rgba(255,255,255,.16);
  }

  .v3-side {
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 16px;
    min-height: 100%;
  }

  .v3-hero-ill {
    position: relative;
    border-radius: 28px;
    overflow: hidden;
    min-height: 360px;
  }

  .v3-hero-ill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.00) 34%, rgba(0,0,0,.14));
    pointer-events: none;
  }

  .v3-hero-ill img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.02);
  }

  .v3-hero-meta {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 18px;
    padding: 16px 18px;
    border-radius: 22px;
    color: #fff;
  }

  .v3-side-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .v3-mini {
    padding: 18px;
    border-radius: 22px;
    color: #fff;
    min-height: 132px;
  }

  .v3-mini strong {
    display: block;
    font-size: 18px;
    line-height: 1.15;
  }

  .v3-mini span {
    display: block;
    margin-top: 8px;
    color: rgba(255,255,255,.78);
    line-height: 1.5;
    font-size: 14px;
  }

  .v3-section-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .v3-section-head h2 {
    margin: 0;
    font-size: clamp(26px, 3vw, 36px);
    line-height: 1.1;
  }

  .v3-section-head p {
    margin: 6px 0 0;
    max-width: 62ch;
    color: var(--c-muted);
  }

  .v3-badge {
    display: inline-flex;
    align-items: center;
    padding: 8px 11px;
    border-radius: 999px;
    background: rgba(0,103,128,.08);
    color: var(--c-primary-700);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .v3-routes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .v3-route {
    overflow: hidden;
    border-radius: 28px;
    border: 1px solid rgba(2, 6, 23, .08);
    background: rgba(255,255,255,.66);
    box-shadow: 0 20px 52px rgba(2, 6, 23, .08);
    text-decoration: none;
    transition: transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }

  .v3-route:hover {
    text-decoration: none;
    transform: translateY(-3px);
    box-shadow: 0 28px 60px rgba(2, 6, 23, .11);
    border-color: rgba(0,103,128,.14);
  }

  .v3-route-media {
    height: 220px;
    background: linear-gradient(180deg, rgba(247,250,252,1), rgba(255,255,255,.84));
    border-bottom: 1px solid rgba(2, 6, 23, .06);
  }

  .v3-route-media img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .v3-route-copy {
    padding: 22px;
  }

  .v3-route-copy h3 {
    margin: 14px 0 8px;
    font-size: 22px;
    line-height: 1.14;
  }

  .v3-route-copy p {
    margin: 0;
    color: var(--c-muted);
    line-height: 1.58;
  }

  .v3-more {
    display: inline-flex;
    margin-top: 16px;
    font-weight: 600;
    color: var(--c-primary-700);
  }

  .v3-profile {
    display: grid;
    grid-template-columns: .96fr 1.04fr;
    gap: 16px;
  }

  .v3-photo-card,
  .v3-text-card,
  .v3-news-card,
  .v3-final {
    border-radius: 28px;
    border: 1px solid rgba(2, 6, 23, .08);
    background: rgba(255,255,255,.72);
    box-shadow: 0 20px 52px rgba(2, 6, 23, .08);
    overflow: hidden;
  }

  .v3-photo-card {
    position: relative;
    min-height: 100%;

      linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.30)),

  <script src="{% static 'motion.js' %}"></script>
  <script>
(() => {
  const root = document.querySelector('[data-v3-mobile-nav]');
  if (!root) return;

  const btn = root.querySelector('.v3-menu-btn');
  const panel = root.querySelector('.v3-mobile-menu');
  const backdrop = root.querySelector('.v3-mobile-backdrop');
  const closeBtn = root.querySelector('.v3-mobile-close');

  if (!btn || !panel || !backdrop || !closeBtn) return;

  const isMobile = () => window.matchMedia('(max-width: 760px)').matches;

  const closeMenu = () => {
    root.classList.remove('v3-menu-open');
    document.body.classList.remove('v3-lock');
    btn.setAttribute('aria-expanded', 'false');
    panel.setAttribute('aria-hidden', 'true');
  };

  const openMenu = () => {
    if (!isMobile()) return;
    root.classList.add('v3-menu-open');
    document.body.classList.add('v3-lock');
    btn.setAttribute('aria-expanded', 'true');
    panel.setAttribute('aria-hidden', 'false');

    window.requestAnimationFrame(() => {
      closeBtn.focus();
    });
  };

  btn.addEventListener('click', () => {
    if (root.classList.contains('v3-menu-open')) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  closeBtn.addEventListener('click', closeMenu);
  backdrop.addEventListener('click', closeMenu);

  panel.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', closeMenu);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  window.addEventListener('resize', () => {
    if (!isMobile()) closeMenu();
  });
})();
</script>
